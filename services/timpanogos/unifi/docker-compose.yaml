services:
  unifi:
    image: jacobalberty/unifi:v10.0.162
    container_name: unifi
    restart: unless-stopped
    init: true
    environment:
      - TZ=America/Denver
    volumes:
      - ./data:/unifi
    ports:
      - "8080:8080"
      - "8443:8443"
      - "3478:3478/udp"
      - "10001:10001/udp"
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/docker-healthcheck.sh || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 5m

